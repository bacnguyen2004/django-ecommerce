services:
  - type: web
    name: bookstore-web
    runtime: python
    plan: free
    buildCommand: "bash build.sh"
    preDeployCommand: "python manage.py migrate --noinput"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: bookstore-db
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: VNPAY_TMN_CODE
        sync: false
      - key: VNPAY_HASH_SECRET_KEY
        sync: false
      - key: VNPAY_PAYMENT_URL
        sync: false
      - key: VNPAY_RETURN_URL
        sync: false

databases:
  - name: bookstore-db
    plan: free
    databaseName: bookstore
    user: bookstore
