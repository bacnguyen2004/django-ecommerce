services:
  db:
    image: postgres:16-alpine
    container_name: bookstore_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bookstore}
      POSTGRES_USER: ${POSTGRES_USER:-bookstore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bookstore}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bookstore} -d ${POSTGRES_DB:-bookstore}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: bookstore_web
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-bookstore}:${POSTGRES_PASSWORD:-bookstore}@db:5432/${POSTGRES_DB:-bookstore}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000"

volumes:
  postgres_data:
